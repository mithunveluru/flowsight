spring:
  application:
    name: flowsight-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/flowsight}
    username: ${DB_USERNAME:flowsight}
    password: ${DB_PASSWORD:flowsight}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
    include-exception: false
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3007}
  storage:
    upload-dir: ${UPLOAD_DIR:/tmp/flowsight-receipts}
  groq:
    api-key: ${GROQ_API_KEY:}
  receipt-ocr:
    url: ${RECEIPT_OCR_URL:}
  receipt:
    # Default quota assigned to brand-new users for OCR receipt processing.
    # Admins can override per user (custom limit or unlimited) via /api/v1/admin/quota.
    # The value is read once at startup; per-user limits are stored in users.receipt_limit.
    default-limit: ${RECEIPT_DEFAULT_LIMIT:50}

logging:
  level:
    com.flowsight: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
