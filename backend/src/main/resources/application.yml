spring:
  application:
    name: flowsight-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/flowsight}
    username: ${DB_USERNAME:flowsight}
    password: ${DB_PASSWORD:flowsight}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # Gmail SMTP for password-reset delivery. Host defaults so JavaMailSender is
  # always autoconfigured; GmailEmailService logs the link instead of sending
  # when username/password are empty (local/CI without credentials).
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  data:
    web:
      pageable:
        # Cap client-supplied ?size= so a single request cannot demand an unbounded page.
        max-page-size: 100
        default-page-size: 25

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
    include-exception: false
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
  health:
    # Don't probe SMTP on the health endpoint: hosts that block outbound SMTP
    # (e.g. Render) would otherwise report the whole service as DOWN.
    mail:
      enabled: false

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      # Access tokens are short-lived (15 min); clients silently rotate their
      # refresh token at /auth/refresh, so a stolen access token dies fast.
      expiration: ${JWT_EXPIRATION:900000}
      # Refresh token lifetime (14 days). Rotated on every use, revoked on
      # logout/password change, reuse triggers full session revocation.
      refresh-expiration: ${REFRESH_TOKEN_EXPIRATION:1209600000}
    # Number of trusted reverse proxies in front of the app (Render/Vercel = 1).
    # Used to pick the client IP from X-Forwarded-For; add 1 per extra hop (CDN).
    trusted-proxy-count: ${TRUSTED_PROXY_COUNT:1}
  cors:
    # Web app (3007), Tauri desktop dev server (1420), and the Tauri webview
    # production origins (tauri://localhost on Linux/macOS, http://tauri.localhost
    # on Windows). Patterns are matched via setAllowedOriginPatterns.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3007,http://localhost:1420,tauri://localhost,http://tauri.localhost}
  storage:
    upload-dir: ${UPLOAD_DIR:/tmp/flowsight-receipts}
  groq:
    api-key: ${GROQ_API_KEY:}
  receipt-ocr:
    url: ${RECEIPT_OCR_URL:}
  receipt:
    # Default quota assigned to brand-new users for OCR receipt processing.
    # Admins can override per user (custom limit or unlimited) via /api/v1/admin/quota.
    # The value is read once at startup; per-user limits are stored in users.receipt_limit.
    default-limit: ${RECEIPT_DEFAULT_LIMIT:50}
  email:
    # Which EmailService implementation is active: gmail, brevo, or resend.
    # Business logic is provider-agnostic; swap here without code changes.
    # Use brevo on hosts that block outbound SMTP (e.g. Render free tier).
    provider: ${EMAIL_PROVIDER:gmail}
    # Gmail From header. Leave empty to send as the authenticated MAIL_USERNAME
    # (Gmail rejects a From that is not the account or an authorized alias).
    gmail-from: ${MAIL_FROM:}
    # Brevo transactional email over HTTPS (used only when provider=brevo).
    # sender-email must be verified in the Brevo dashboard. If api-key/sender are
    # empty the service logs the reset link instead of dispatching.
    brevo:
      api-key: ${BREVO_API_KEY:}
      sender-email: ${BREVO_SENDER_EMAIL:}
      sender-name: ${BREVO_SENDER_NAME:FlowSight}
    # Resend transactional email (used only when provider=resend). If api-key is
    # empty the service logs the reset link instead of dispatching.
    resend:
      api-key: ${RESEND_API_KEY:}
    from: ${RESEND_FROM_EMAIL:FlowSight <noreply@flowsight.app>}
    reply-to: ${RESEND_REPLY_TO:}
  password-reset:
    expiration-minutes: ${PASSWORD_RESET_EXPIRATION_MINUTES:30}
    frontend-url: ${FRONTEND_URL:http://localhost:3007}
    # DEV ONLY. When true, the /forgot-password response includes the reset link
    # so the flow can be exercised locally without a configured email provider
    # (the link is otherwise only written to logs). This reveals whether an email
    # is registered, so it MUST stay false in any shared or production environment.
    dev-expose-link: ${PASSWORD_RESET_DEV_EXPOSE_LINK:false}

logging:
  level:
    com.flowsight: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
