services:
  receipt-ocr:
    container_name: flowsight-receipt-ocr
    build:
      # Pinned to a specific commit for reproducible builds. Bump this SHA to
      # pull upstream changes; vendor/fork the service if it needs local patches.
      context: https://github.com/bhimrazy/receipt-ocr.git#ac1c5fcd9c0d6fcea27aa2a39d2fd2ff54914a24:app
    environment:
      OPENAI_API_KEY: ${GROQ_API_KEY:-placeholder}
      OPENAI_BASE_URL: https://api.groq.com/openai/v1
      OPENAI_MODEL: ${RECEIPT_OCR_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: flowsight-postgres
    environment:
      POSTGRES_DB: flowsight
      POSTGRES_USER: flowsight
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowsight_dev}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowsight"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowsight-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/flowsight
      DB_USERNAME: flowsight
      DB_PASSWORD: ${POSTGRES_PASSWORD:-flowsight_dev}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      # Web app + Tauri desktop (dev server 1420 and tauri://localhost / http://tauri.localhost webview origins)
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3007,http://localhost:1420,tauri://localhost,http://tauri.localhost}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      RECEIPT_OCR_URL: ${RECEIPT_OCR_URL:-http://receipt-ocr:8000}
      # Email delivery. Default provider is Gmail SMTP; set EMAIL_PROVIDER=resend to switch.
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-gmail}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-FlowSight <noreply@flowsight.app>}
      RESEND_REPLY_TO: ${RESEND_REPLY_TO:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3007}
      PASSWORD_RESET_EXPIRATION_MINUTES: ${PASSWORD_RESET_EXPIRATION_MINUTES:-30}
      # DEV ONLY: returns the reset link in the /forgot-password response so the
      # flow is testable without a verified email domain. Keep false in prod.
      PASSWORD_RESET_DEV_EXPOSE_LINK: ${PASSWORD_RESET_DEV_EXPOSE_LINK:-false}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      receipt-ocr:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flowsight-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3007:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
